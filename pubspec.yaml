name: quizzerg
description: "Quizzerg is a quiz app that allows you to create and share quizzes with your friends."
publish_to: "none"

version: 0.5.0

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: 3.29.2

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl:

  # Navigation
  auto_route: 9.2.2

  # Storage
  shared_preferences: 2.3.2
  drift: 2.22.1
  drift_flutter: 0.2.4
  sqlite3_flutter_libs: 0.5.28

  # Architecture
  nested: 1.0.0
  provider: 6.1.2
  bloc: 8.1.4
  flutter_bloc: 8.1.6
  rxdart: 0.28.0
  async: 2.12.0

  # UI
  flutter_svg: 2.0.6
  octo_image: 2.1.0
  cached_network_image: 3.4.1

  # Utils
  surf_logger: 2.0.2
  logger: 1.4.0
  freezed_annotation: 2.4.4
  json_annotation: 4.9.0
  path: 1.9.1
  csv: 6.0.0
  equatable: 2.0.5
  file_picker: 8.1.7
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  zoloto:
    git:
      url: https://surfstudio.gitlab.yandexcloud.net/internal/flutter/zoloto

  auto_route_generator: 9.0.0
  build_runner: 2.4.12
  flutter_gen: 5.10.0
  drift_dev: 2.22.1
  freezed: 2.5.2
  json_serializable: 6.8.0
  surf_lint_rules: 3.1.0
  theme_tailor: 3.0.1
  spider: 4.2.2
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.5

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Nexa
      fonts:
        - asset: assets/fonts/Nexa-Thin.otf
          weight: 100
        - asset: assets/fonts/NexaText-Thin.otf
          weight: 200
        - asset: assets/fonts/NexaText-Light.otf
          weight: 300
        - asset: assets/fonts/NexaText-Regular.otf
          weight: 400
        - asset: assets/fonts/Nexa-Bold_0.otf
          weight: 700
        - asset: assets/fonts/Nexa-Black_0.otf
          weight: 900

  assets:
    - assets/icons/

  shaders:
    - assets/shaders/background.frag

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true
